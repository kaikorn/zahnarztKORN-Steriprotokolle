function renderForm(){

function sfd(k,v){state.fd[k]=v;}
function tpill(k,v){state.fd[k]=(state.fd[k]===v?null:v);render();}
function tfd(k){state.fd[k]=!state.fd[k];render();}
function openForm(t){var sni=SN[t];state.form=t;state.fd={date:today(),time:nowTime()};if(sni)state.fd.geraet_sn=sni.name+' | '+sni.sn;state.sig=null;render();}
function closeForm(){state.form=null;render();}
function goArchive(){state.view='archive';state.sel={};render();}
function goDash(){state.view='dash';render();}
function setFilter(v){state.archFilter=v;state.sel={};render();}
function closePrint(){state.printEntries=null;render();}
function viewEntry(id){var e=state.entries.find(function(x){return x.id===id;});if(e){state.printEntries=[e];render();}}
function viewAll(){state.printEntries=getFiltered();render();}
function viewSel(){var sel=state.entries.filter(function(e){return state.sel[e.id];});if(sel.length>0){state.printEntries=sel;render();}}
function toggleSel(id){state.sel[id]=!state.sel[id];render();}
function selAll(){getFiltered().forEach(function(e){state.sel[e.id]=true;});render();}
function selNone(){state.sel={};render();}
function delEntry(id){if(!confirm('Dieses Protokoll wirklich löschen?'))return;state.entries=state.entries.filter(function(e){return e.id!==id;});delete state.sel[id];saveData();render();}
function delSel(){var sel=Object.keys(state.sel).filter(function(k){return state.sel[k];});if(sel.length===0)return;if(!confirm('Wirklich '+sel.length+' Protokoll(e) löschen?'))return;sel.forEach(function(id){state.entries=state.entries.filter(function(e){return e.id!=id;});delete state.sel[id];});saveData();render();}
function deleteAll(){var f=getFiltered();if(f.length===0)return;if(!confirm('Wirklich alle '+f.length+' Protokolle löschen?'))return;var ids=f.map(function(e){return e.id;});state.entries=state.entries.filter(function(e){return ids.indexOf(e.id)<0;});state.sel={};saveData();render();}
function doSave(){var btn=document.getElementById('save-btn');if(btn){btn.disabled=true;btn.textContent='Wird gespeichert...';}var entry={id:Date.now(),type:state.form,data:Object.assign({},state.fd),sig:state.sig,at:new Date().toISOString()};state.entries.unshift(entry);saveData();state.form=null;state.printEntries=[entry];render();}
function initSig(){sigCanvas=document.getElementById('sig-canvas');if(!sigCanvas)return;sigCtx=sigCanvas.getContext('2d');drawing=false;function getP(e,c){var r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height,s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*sx,y:(s.clientY-r.top)*sy};}sigCanvas.onmousedown=function(e){drawing=true;var p=getP(e,sigCanvas);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y);};sigCanvas.onmousemove=function(e){if(!drawing)return;sigCtx.lineWidth=2;sigCtx.lineCap='round';sigCtx.strokeStyle='#1a1a1a';var p=getP(e,sigCanvas);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();};sigCanvas.onmouseup=sigCanvas.onmouseleave=function(){drawing=false;if(sigCanvas)state.sig=sigCanvas.toDataURL();};sigCanvas.ontouchstart=function(e){e.preventDefault();drawing=true;var p=getP(e,sigCanvas);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y);};sigCanvas.ontouchmove=function(e){e.preventDefault();if(!drawing)return;sigCtx.lineWidth=2;sigCtx.lineCap='round';sigCtx.strokeStyle='#1a1a1a';var p=getP(e,sigCanvas);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();};sigCanvas.ontouchend=function(){drawing=false;if(sigCanvas)state.sig=sigCanvas.toDataURL();};}
function clearSig(){if(sigCtx&&sigCanvas)sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);state.sig=null;}
function triggerCam(){var input=document.getElementById('cam-input');input.onchange=function(e){var file=e.target.files[0];if(!file)return;var r=new FileReader();r.onload=function(ev){state.fd.foto=ev.target.result;render();};r.readAsDataURL(file);input.value='';};input.click();}

    '@media print{.hint{display:none}.print-btn{display:none}}'+

  var blob=new Blob([html],{type:'text/html'});
